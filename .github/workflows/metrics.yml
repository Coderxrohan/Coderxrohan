name: GitHub Metrics

on:
  schedule:
    - cron: '0 0 * * *'     # optional: update daily
  workflow_dispatch:        # allow manual trigger
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Generate metrics SVG
      uses: lowlighter/metrics@latest
      with:
        token: ${{ secrets.GITHUB_TOKEN }}   # auto GitHub token
        filename: metrics.classic.svg         # output file
        base: classic                         # use classic template
